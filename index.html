<!DOCTYPE html> <html> <head> <title>Galaxy Automotive</title> <style> body{ margin:0; background:#111; color:white; font-family:Arial,sans-serif; } header{ background:linear-gradient(90deg,#5b2cff,#00c3ff); padding:35px; text-align:center; } .hero{ text-align:center; padding:60px 20px; background:#181818; } .hero button{ background:#5b2cff; color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-size:16px; } .cars{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:30px; } .card{ background:#1e1e1e; border-radius:15px; overflow:hidden; border:1px solid #333; transition:0.2s; } .card:hover{ transform:translateY(-5px); box-shadow:0 0 15px rgba(91,44,255,.5); } .card img{ width:100%; height:180px; object-fit:cover; background:#000; } .content{ padding:15px; } .content h2{ margin-top:0; color:#d7c7ff; } .btn{ display:inline-block; margin-top:10px; background:#5b2cff; color:white; padding:10px 15px; border-radius:8px; text-decoration:none; } footer{ text-align:center; background:#000; padding:20px; margin-top:20px; } .loading{ text-align:center; padding:40px; color:#aaa; } </style> </head> <body> <header> <h1>Galaxy Automotive</h1> <p>Official Galaxy Automotive Dealership</p> </header> <section class="hero"> <h1>Welcome to Galaxy Automotive</h1> <p> Choose your vehicle, visit the dealership, and enjoy your new ride. </p> <button onclick="document.getElementById('cars').scrollIntoView()"> Browse Vehicles </button> </section> <div class="loading" id="loading"> Loading vehicles... </div> <section class="cars" id="cars"></section> <footer> © 2026 Galaxy Automotive | Hosted on Pepper Spray's 2026 </footer> <script> const API = "https://solitary-flower-fe24.whyacat-on-steam.workers.dev/"; fetch(API) .then(res => res.json()) .then(data => { const cars = document.getElementById("cars"); const loading = document.getElementById("loading"); loading.style.display = "none"; cars.innerHTML = ""; if(!data || data.length === 0){ cars.innerHTML = ` <h2> No vehicles found. </h2> `; return; } data.forEach(car => { const card = document.createElement("div"); card.className = "card"; card.innerHTML = ` <img src="${car.image}" alt="Vehicle"> <div class="content"> <h2>${car.title}</h2> <p> Galaxy Automotive vehicle. </p> <p> <b>Status:</b> ${car.status || "Available"} </p> <p> <b>Dealer:</b> ${car.dealer || "Galaxy Automotive"} </p> <p> <b>Server:</b> ${car.server || "Pepper Spray's 2026"} </p> <a class="btn" href="${car.link}" target="_blank" > View Vehicle </a> </div> `; cars.appendChild(card); }); }) .catch(error => { console.log(error); document.getElementById("loading").innerHTML = ` Failed loading Galaxy vehicles. `; }); </script> </body> </html>
