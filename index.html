<!DOCTYPE html> <html> <head> <title>Galaxy Automotive RP</title> <style> body{margin:0;background:#111;color:white;font-family:Arial} header{padding:35px;text-align:center;background:linear-gradient(90deg,#5b2cff,#00c3ff)} .cars{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:30px} .card{background:#1e1e1e;border-radius:15px;overflow:hidden;border:1px solid #333} .card img{width:100%;height:180px;object-fit:cover;background:#000} .content{padding:15px} .btn{display:inline-block;margin-top:10px;background:#5b2cff;color:white;padding:10px 15px;border-radius:8px;text-decoration:none} </style> </head> <body> <header> <h1>Galaxy Automotive RP</h1> <p>Live Brick Rigs Vehicle Dealership</p> </header> <section class="cars" id="cars"> <h2>Loading cars...</h2> </section> <script> const API = "https://solitary-flower-fe24.whyacat-on-steam.workers.dev/"; fetch(API) .then(res => res.json()) .then(cars => { const box = document.getElementById("cars"); box.innerHTML = ""; if (!cars.length) { box.innerHTML = "<h2>No cars found. Steam page layout may be different.</h2>"; return; } cars.forEach(car => { box.innerHTML += <div class="card"> <img src="${car.image}"> <div class="content"> <h2>${car.title}</h2> <p><b>Status:</b> ${car.status}</p> <p><b>Dealer:</b> ${car.dealer}</p> <p><b>Server:</b> ${car.server}</p> <a class="btn" href="${car.link}" target="_blank">View Vehicle</a> </div> </div> ; }); }) .catch(() => { document.getElementById("cars").innerHTML = "<h2>Failed loading Galaxy cars.</h2>"; }); </script> </body> </html>
